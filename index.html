<body data-theme="dark" data-cap-app="1">
  <div class="cap-ambient" aria-hidden="true"></div>
  <canvas id="cap-scene" class="cap-scene-canvas cap-scene-canvas--subtle" aria-hidden="true"></canvas>
  <div class="cap-scroll-progress" aria-hidden="true"></div>
  <script>
    const theme = localStorage.getItem('theme') || 'dark';
    document.body.setAttribute('data-theme', theme);
    window.toggleTheme = function() {
      const current = document.body.getAttribute('data-theme') || 'dark';
      const next = current === 'dark' ? 'light' : 'dark';
      document.body.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      const btn = document.getElementById('theme-toggle');
      if (btn) btn.textContent = next === 'dark' ? '🌙' : '☀️';
      if (window.Navigation && Navigation.applyTheme) Navigation.applyTheme(next);
      if (window.App && App.applyTheme) App.applyTheme(next);
    };
  </script>
  <div id="splash" class="splash">
    <div class="splash-mark">₨</div>
    <div class="splash-title">LedgerCap</div>
    <div class="splash-sub">Investment OS</div>
    <div class="splash-bar"><div id="splash-fill"></div></div>
  </div>
  <div id="install-hint" class="install-hint hidden">
    <span>📲</span>
    <p><strong>Install LedgerCap</strong> — Safari → Share → <strong>Add to Home Screen</strong></p>
    <button type="button" class="btn-ghost" onclick="App.dismissInstall()">✕</button>
  </div>
  <div class="lc-shell">
  <header id="app-header" class="app-header">

    <span id="app-title" style="font-weight:700">LedgerCap</span>
    <button id="theme-toggle" class="theme-toggle" onclick="window.toggleTheme?.()" title="Toggle theme" aria-label="Toggle theme">🌙</button>
  </header>
  <nav id="nav-sidebar" aria-label="Module navigation"></nav>
  <div id="app">
