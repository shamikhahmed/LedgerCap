<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F7B500">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="StundsOS">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg">
  <link rel="apple-touch-icon" href="assets/icons/icon-512.png">
  <link rel="apple-touch-icon" sizes="192x192" href="assets/icons/icon-192.png">
  <title>StundsOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css?v=8">
  <link rel="stylesheet" href="css/identity.css">
</head>
<body>
  <div id="splash" class="splash">
    <div class="splash-mark">₨</div>
    <div class="splash-title">StundsOS</div>
    <div class="splash-sub">Personal Wealth OS</div>
    <div class="splash-bar"><div id="splash-fill"></div></div>
  </div>
  <div id="install-hint" class="install-hint hidden">
    <span>📲</span>
    <p><strong>Install StundsOS</strong> — Safari → Share → <strong>Add to Home Screen</strong></p>
    <button type="button" class="btn-ghost" onclick="App.dismissInstall()">✕</button>
  </div>
  <div id="app">
    <div id="screens">
      <div id="screen-dashboard" class="screen active"></div>
      <div id="screen-portfolio" class="screen"></div>
      <div id="screen-transactions" class="screen"></div>
      <div id="screen-income" class="screen"></div>
      <div id="screen-settings" class="screen"></div>
    </div>
    <nav id="nav"></nav>
  </div>

  <!-- FAB -->
  <button class="fab hidden" id="fab" onclick="App.openAddTransaction()" aria-label="Add transaction">+</button>

  <!-- Bottom Sheet -->
  <div class="bottom-sheet" id="bottom-sheet">
    <div class="bs-backdrop"></div>
    <div class="bs-panel">
      <div class="bs-handle"></div>
      <div class="bs-header">
        <div class="bs-title" id="bs-title"></div>
        <button class="btn-ghost" style="padding:6px 12px;" onclick="App.closeBottomSheet()">✕</button>
      </div>
      <div class="bs-body" id="bs-body"></div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-wrap" id="toast-wrap"></div>

  <!-- Scripts — dependency order -->
  <script src="js/data/holdings.js"></script>
  <script src="js/data/config.js"></script>
  <script src="js/engines/ledger.js"></script>
  <script src="js/engines/prices.js"></script>
  <script src="js/engines/insights.js"></script>
  <script src="js/engines/projections.js"></script>
  <script src="js/modules/state.js"></script>
  <script src="js/modules/onboarding.js"></script>
  <script src="js/modules/reports.js"></script>
  <script src="js/modules/investment.js"></script>
  <script src="js/modules/dashboard.js"></script>
  <script src="js/modules/portfolio.js"></script>
  <script src="js/modules/transactions.js"></script>
  <script src="js/modules/income.js"></script>
  <script src="js/modules/settings.js"></script>
  <script src="js/ui/charts.js"></script>
  <script src="js/ui/navigation.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
