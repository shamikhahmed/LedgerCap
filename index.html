<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LedgerCap">
  <meta name="author" content="Capricorn Systems">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg">
  <link rel="apple-touch-icon" href="assets/icons/icon-512.png">
  <link rel="apple-touch-icon" sizes="192x192" href="assets/icons/icon-192.png">
  <meta name="description" content="Premium investment OS — portfolio intelligence, research, and wealth tracking. Offline-first.">
  <title>LedgerCap</title>
  <link rel="canonical" href="https://shamikhahmed.github.io/LedgerCap/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="css/capricorn-core.css">
  <link rel="stylesheet" href="css/app.css?v=11">
  <link rel="stylesheet" href="css/ledger-os.css">
  <link rel="stylesheet" href="css/platform.css">
  <link rel="stylesheet" href="css/identity.css">
</head>
<body>
  <div id="splash" class="splash">
    <div class="splash-mark">₨</div>
    <div class="splash-title">LedgerCap</div>
    <div class="splash-sub">Investment OS</div>
    <div class="splash-bar"><div id="splash-fill"></div></div>
  </div>
  <div id="install-hint" class="install-hint hidden">
    <span>📲</span>
    <p><strong>Install LedgerCap</strong> — Safari → Share → <strong>Add to Home Screen</strong></p>
    <button type="button" class="btn-ghost" onclick="App.dismissInstall()">✕</button>
  </div>
  <nav id="nav-sidebar"></nav>
  <div id="app">
    <div id="screens">
      <div id="screen-dashboard" class="screen active"></div>
      <div id="screen-portfolio" class="screen"></div>
      <div id="screen-holdings" class="screen"></div>
      <div id="screen-research" class="screen"></div>
      <div id="screen-watchlist" class="screen"></div>
      <div id="screen-dividends" class="screen"></div>
      <div id="screen-intelligence" class="screen"></div>
      <div id="screen-journal" class="screen"></div>
      <div id="screen-settings" class="screen"></div>
      <div id="screen-transactions" class="screen"></div>
    </div>
    <nav id="nav"></nav>
  </div>

  <button class="fab hidden" id="fab" onclick="App.openAddTransaction()" aria-label="Add transaction">+</button>

  <div class="bottom-sheet" id="bottom-sheet">
    <div class="bs-backdrop"></div>
    <div class="bs-panel">
      <div class="bs-handle"></div>
      <div class="bs-header">
        <div class="bs-title" id="bs-title"></div>
        <button class="btn-ghost" style="padding:6px 12px;" onclick="App.closeBottomSheet()">✕</button>
      </div>
      <div class="bs-body" id="bs-body"></div>
    </div>
  </div>

  <div class="toast-wrap" id="toast-wrap"></div>

  <script src="js/data/holdings.js"></script>
  <script src="js/data/fundamentals.js"></script>
  <script src="js/data/dividends.js"></script>
  <script src="js/data/config.js"></script>
  <script src="js/engines/ledger.js"></script>
  <script src="js/engines/prices.js"></script>
  <script src="js/engines/insights.js"></script>
  <script src="js/engines/projections.js"></script>
  <script src="js/engines/analytics.js"></script>
  <script src="js/engines/ai-analysis.js"></script>
  <script src="js/services/market-data.js"></script>
  <script src="js/services/stock-service.js"></script>
  <script src="js/services/corporate-actions-service.js"></script>
  <script src="js/services/dividend-analytics-service.js"></script>
  <script src="js/services/dividend-service.js"></script>
  <script src="js/services/research-service.js"></script>
  <script src="js/services/portfolio-analytics-service.js"></script>
  <script src="js/ui/platform.js"></script>
  <script src="js/modules/state.js"></script>
  <script src="js/modules/onboarding.js"></script>
  <script src="js/modules/investment.js"></script>
  <script src="js/modules/dashboard.js"></script>
  <script src="js/modules/portfolio.js"></script>
  <script src="js/modules/holdings.js"></script>
  <script src="js/modules/research.js"></script>
  <script src="js/modules/watchlist.js"></script>
  <script src="js/modules/dividends.js"></script>
  <script src="js/modules/intelligence.js"></script>
  <script src="js/modules/journal.js"></script>
  <script src="js/modules/transactions.js"></script>
  <script src="js/modules/settings.js"></script>
  <script src="js/ui/charts.js"></script>
  <script src="js/ui/motion.js"></script>
  <script src="js/ui/navigation.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
