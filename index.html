<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#FF6B35">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="StundsOS">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon.svg">
  <link rel="stylesheet" href="css/app.css">
  <title>StundsOS</title>
</head>
<body>
<div id="app">
  <div id="screens">
    <div id="screen-overview" class="screen active"></div>
    <div id="screen-stocks"   class="screen"></div>
    <div id="screen-funds"    class="screen"></div>
    <div id="screen-advisor"  class="screen"></div>
    <div id="screen-you"      class="screen"></div>
  </div>
  <nav id="nav">
    <button class="nav-tab active" data-tab="overview" onclick="Navigation.go('overview')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      <span class="nav-label">Overview</span>
    </button>
    <button class="nav-tab" data-tab="stocks" onclick="Navigation.go('stocks')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
        <polyline points="16 7 22 7 22 13"/>
      </svg>
      <span class="nav-label">Stocks</span>
    </button>
    <button class="nav-tab" data-tab="funds" onclick="Navigation.go('funds')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
        <path d="M12 6v6l4 2"/>
      </svg>
      <span class="nav-label">Funds</span>
    </button>
    <button class="nav-tab" data-tab="advisor" onclick="Navigation.go('advisor')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 11l3 3L22 4"/>
        <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
      </svg>
      <span class="nav-label">Advisor</span>
    </button>
    <button class="nav-tab" data-tab="you" onclick="Navigation.go('you')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      <span class="nav-label">You</span>
    </button>
  </nav>
</div>

<!-- Price Update Modal -->
<div id="price-modal" class="price-modal">
  <div class="price-modal-header">
    <div>
      <div style="font-size:1rem;font-weight:700;">Update Prices</div>
      <div style="font-size:0.72rem;color:var(--text3);margin-top:2px;">Enter current market prices or fetch from Yahoo</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="btn-ghost btn-sm" id="price-modal-yahoo">⟳ Yahoo</button>
      <button class="btn-primary btn-sm" id="price-modal-save" style="width:auto;padding:8px 16px;">Save All</button>
      <button class="btn-ghost btn-sm" id="price-modal-close">✕</button>
    </div>
  </div>
  <div style="flex:1;overflow-y:auto;scrollbar-width:none;" id="price-modal-list"></div>
</div>

<!-- Stock / Fund Detail Sheet -->
<div id="detail-sheet" class="detail-sheet">
  <div class="detail-header">
    <button class="btn-ghost btn-sm" onclick="document.getElementById('detail-sheet').classList.remove('open')">← Back</button>
  </div>
  <div id="detail-content" style="padding:16px 16px 40px;"></div>
</div>

<!-- Toast Container -->
<div id="toast-wrap" class="toast-wrap"></div>

<!-- Scripts — load order matters -->
<script src="js/data/holdings.js"></script>
<script src="js/modules/state.js"></script>
<script src="js/ui/charts.js"></script>
<script src="js/modules/overview.js"></script>
<script src="js/modules/stocks.js"></script>
<script src="js/modules/funds.js"></script>
<script src="js/modules/advisor.js"></script>
<script src="js/modules/you.js"></script>
<script src="js/ui/navigation.js"></script>
<script src="js/app.js"></script>
</body>
</html>
