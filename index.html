<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FF6B35">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="StundsOS">
  <link rel="manifest" href="/manifest.json">
  <title>StundsOS</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div id="app">
    <div id="screens">
      <div id="screen-dashboard" class="screen active"></div>
      <div id="screen-portfolio" class="screen"></div>
      <div id="screen-transactions" class="screen"></div>
      <div id="screen-income" class="screen"></div>
      <div id="screen-settings" class="screen"></div>
    </div>
    <nav id="nav"></nav>
  </div>

  <!-- FAB -->
  <button class="fab hidden" id="fab" onclick="App.openAddTransaction()" aria-label="Add transaction">+</button>

  <!-- Bottom Sheet -->
  <div class="bottom-sheet" id="bottom-sheet">
    <div class="bs-backdrop"></div>
    <div class="bs-panel">
      <div class="bs-handle"></div>
      <div class="bs-header">
        <div class="bs-title" id="bs-title"></div>
        <button class="btn-ghost" style="padding:6px 12px;" onclick="App.closeBottomSheet()">✕</button>
      </div>
      <div class="bs-body" id="bs-body"></div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-wrap" id="toast-wrap"></div>

  <!-- Scripts — dependency order -->
  <script src="/js/data/holdings.js"></script>
  <script src="/js/engines/ledger.js"></script>
  <script src="/js/engines/prices.js"></script>
  <script src="/js/engines/insights.js"></script>
  <script src="/js/engines/projections.js"></script>
  <script src="/js/modules/state.js"></script>
  <script src="/js/modules/dashboard.js"></script>
  <script src="/js/modules/portfolio.js"></script>
  <script src="/js/modules/transactions.js"></script>
  <script src="/js/modules/income.js"></script>
  <script src="/js/modules/settings.js"></script>
  <script src="/js/ui/charts.js"></script>
  <script src="/js/ui/navigation.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
