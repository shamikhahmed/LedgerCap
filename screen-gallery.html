<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LedgerCap — Screen Gallery</title>
  <style>
    :root {
      --bg: #0a0a0c;
      --surface: #141418;
      --border: #2a2a32;
      --text: #f4f4f6;
      --muted: #9a9aa8;
      --accent: #22c55e;
      --accent-dim: rgba(34, 197, 94, 0.15);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 10, 12, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
    }
    h1 { margin: 0 0 4px; font-size: 1.35rem; font-weight: 650; }
    .sub { color: var(--muted); font-size: 0.85rem; margin: 0 0 12px; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .toolbar label { font-size: 0.8rem; color: var(--muted); display: flex; align-items: center; gap: 6px; cursor: pointer; }
    select, .btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .btn:hover, select:hover { border-color: var(--accent); }
    .btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.78rem;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .pill:hover { border-color: var(--accent); }
    .pill.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .pill:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    main { padding: 20px; max-width: 1400px; margin: 0 auto; }
    .section { margin-bottom: 36px; scroll-margin-top: 140px; }
    .section h2 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }
    .card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .card img {
      width: 100%;
      aspect-ratio: 9 / 19.5;
      object-fit: cover;
      object-position: top;
      display: block;
      background: #000;
    }
    body.viewport-desktop .card img,
    body.viewport-desktop .compare img {
      aspect-ratio: 16 / 10;
      object-fit: contain;
      background: #0a0a0c;
    }
    .card.missing { cursor: default; opacity: 0.72; }
    .card.missing:hover { transform: none; border-color: var(--border); box-shadow: none; }
    .card .missing-pill {
      display: flex; align-items: center; justify-content: center;
      aspect-ratio: 9 / 19.5; background: #111; color: var(--muted);
      font-size: 0.75rem; text-align: center; padding: 12px;
    }
    body.viewport-desktop .card .missing-pill { aspect-ratio: 16 / 10; }
    .card .label { font-size: 0.82rem; font-weight: 500; }
    .card .tag { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
    .compare { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    .compare img { aspect-ratio: 9 / 19.5; width: 100%; object-fit: cover; object-position: top; }
    .compare-label { font-size: 0.65rem; text-align: center; color: var(--muted); padding: 4px; }
    .empty { color: var(--muted); padding: 40px; text-align: center; }
    .err { color: #f87171; padding: 20px; }

  /* Lightbox */
    #lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.92);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: min(420px, 90vw);
      max-height: 80vh;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    #lb-caption { color: #fff; margin-top: 12px; font-size: 0.9rem; text-align: center; }
    .lb-btn {
      position: absolute;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: #fff;
      font-size: 1.5rem;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lb-btn:hover { background: rgba(255, 255, 255, 0.2); }
    #lb-close { top: 16px; right: 16px; font-size: 1.8rem; }
    #lb-prev { left: 16px; top: 50%; transform: translateY(-50%); }
    #lb-next { right: 16px; top: 50%; transform: translateY(-50%); }
    .lb-compare { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .lb-compare figure { margin: 0; text-align: center; }
    .lb-compare figcaption { color: var(--muted); font-size: 0.75rem; margin-top: 6px; }
  </style>
</head>
<body>
  <header>
    <h1>LedgerCap Screen Gallery</h1>
    <p class="sub" id="stats">Loading manifest…</p>
    <div class="toolbar">
      <button type="button" class="btn active" data-viewport="mobile" id="btnMobile">Mobile</button>
      <button type="button" class="btn" data-viewport="desktop" id="btnDesktop">Browser</button>
      <span>Theme:</span>
      <button type="button" class="btn active" data-theme="dark" id="btnDark">Dark</button>
      <button type="button" class="btn" data-theme="light" id="btnLight">Light</button>
      <button type="button" class="btn" data-theme="compare" id="btnCompare">Compare</button>
      <label><input type="checkbox" id="scrollOnly" /> Scroll shots only</label>
      <label><input type="checkbox" id="includeScroll" checked /> Include scroll variants</label>
      <select id="sectionFilter" aria-label="Filter by section">
        <option value="">All sections</option>
      </select>
    </div>
    <div class="pills" id="categoryPills" role="toolbar" aria-label="Category filters"></div>
  </header>
  <main id="gallery"></main>

  <div id="lightbox" role="dialog" aria-modal="true" aria-label="Screenshot preview">
    <button type="button" class="lb-btn" id="lb-close" aria-label="Close">×</button>
    <button type="button" class="lb-btn" id="lb-prev" aria-label="Previous">‹</button>
    <button type="button" class="lb-btn" id="lb-next" aria-label="Next">›</button>
    <div id="lb-content"></div>
    <p id="lb-caption"></p>
  </div>

  <script>
    const state = {
      manifest: null,
      theme: 'dark',
      viewport: 'mobile',
      sectionFilter: '',
      scrollOnly: false,
      includeScroll: true,
      flatItems: [],
      lightboxIndex: -1,
      cacheBust: '',
    };

    const $ = (sel) => document.querySelector(sel);
    const gallery = $('#gallery');
    const stats = $('#stats');
    const sectionFilter = $('#sectionFilter');
    const categoryPills = $('#categoryPills');

    function imgSrc(rel) {
      if (!rel) return '';
      const base = `assets/screenshots/${rel}`;
      return state.cacheBust ? `${base}?v=${state.cacheBust}` : base;
    }

    function buildFlatItems() {
      state.flatItems = [];
      if (!state.manifest?.sections) return;
      for (const sec of state.manifest.sections) {
        for (const item of sec.items || []) {
          state.flatItems.push({ ...item, sectionId: sec.id, sectionLabel: sec.label || sec.title });
        }
      }
    }

    function pickThemePath(bucket, theme) {
      if (!bucket) return '';
      const val = bucket[theme];
      if (!val) return '';
      if (typeof val === 'string') return val;
      return val[state.viewport] || '';
    }

    function hasViewportShot(bucket, theme) {
      const val = bucket?.[theme];
      if (!val) return false;
      if (typeof val === 'string') return true;
      return !!val[state.viewport];
    }

    function hasAnyShot(item) {
      const check = (bucket) => {
        if (!bucket) return false;
        return hasViewportShot(bucket, 'dark') || hasViewportShot(bucket, 'light');
      };
      return check(item.files) || (state.includeScroll && check(item.scroll));
    }

    function visibleItems() {
      let items = state.flatItems;
      if (state.sectionFilter) {
        items = items.filter((i) => i.sectionId === state.sectionFilter);
      }
      return items.filter((item) => {
        if (state.scrollOnly) {
          const b = item.scroll;
          return !!(pickThemePath(b, 'dark') || pickThemePath(b, 'light'));
        }
        return hasAnyShot(item);
      });
    }

    function getItemImage(item, theme, scroll = false) {
      const bucket = scroll ? item.scroll : item.files;
      if (!bucket) return '';
      if (theme === 'compare') return pickThemePath(bucket, 'dark') || pickThemePath(bucket, 'light');
      return pickThemePath(bucket, theme);
    }

    function renderCard(item, scroll = false) {
      const rel = getItemImage(item, state.theme, scroll);
      const tag = scroll ? 'scroll' : 'viewport';
      const cardId = `${item.id}${scroll ? '-scroll' : ''}`;
      const bucket = scroll ? item.scroll : item.files;
      const missing =
        state.theme !== 'compare' && !rel &&
        (hasViewportShot(bucket, 'dark') || hasViewportShot(bucket, 'light'));

      if (state.theme === 'compare' && !scroll) {
        const dark = pickThemePath(item.files, 'dark');
        const light = pickThemePath(item.files, 'light');
        if (!dark && !light) return '';
        return `
          <article class="card" tabindex="0" role="button" data-id="${cardId}" data-item-id="${item.id}" data-scroll="${scroll}">
            <div class="compare">
              <div><div class="compare-label">Dark</div><img src="${imgSrc(dark)}" alt="${item.label} dark" loading="lazy" /></div>
              <div><div class="compare-label">Light</div><img src="${imgSrc(light)}" alt="${item.label} light" loading="lazy" /></div>
            </div>
            <div class="meta"><div class="label">${item.label}</div><div class="tag">${item.sectionLabel} · compare · ${state.viewport}</div></div>
          </article>`;
      }

      if (!rel) {
        if (!missing) return '';
        return `
          <article class="card missing" data-id="${cardId}" data-item-id="${item.id}" data-scroll="${scroll}">
            <div class="missing-pill">No ${state.viewport} shot</div>
            <div class="meta">
              <div class="label">${item.label}</div>
              <div class="tag">${item.sectionLabel} · missing ${state.viewport} · ${tag}</div>
            </div>
          </article>`;
      }

      return `
        <article class="card" tabindex="0" role="button" data-id="${cardId}" data-item-id="${item.id}" data-scroll="${scroll}">
          <img src="${imgSrc(rel)}" alt="${item.label}" loading="lazy" />
          <div class="meta">
            <div class="label">${item.label}</div>
            <div class="tag">${item.sectionLabel} · ${state.theme} · ${state.viewport} · ${tag}</div>
          </div>
        </article>`;
    }

    function render() {
      const items = visibleItems();
      if (!items.length) {
        gallery.innerHTML = '<p class="empty">No screens match current filters.</p>';
        return;
      }

      const bySection = new Map();
      for (const item of items) {
        if (!bySection.has(item.sectionId)) {
          bySection.set(item.sectionId, { label: item.sectionLabel, items: [] });
        }
        bySection.get(item.sectionId).items.push(item);
      }

      let html = '';
      for (const sec of state.manifest.sections) {
        const group = bySection.get(sec.id);
        if (!group) continue;
        html += `<section class="section" id="section-${sec.id}"><h2>${group.label}</h2><div class="grid">`;
        for (const item of group.items) {
          if (state.scrollOnly) {
            html += renderCard(item, true);
          } else {
            if (item.files?.dark || item.files?.light) {
              if (hasViewportShot(item.files, 'dark') || hasViewportShot(item.files, 'light')) html += renderCard(item, false);
            }
            if (state.includeScroll && (item.scroll?.dark || item.scroll?.light)) {
              if (hasViewportShot(item.scroll, 'dark') || hasViewportShot(item.scroll, 'light')) html += renderCard(item, true);
            }
          }
        }
        html += '</div></section>';
      }
      gallery.innerHTML = html;

      gallery.querySelectorAll('.card').forEach((card, idx) => {
        card.addEventListener('click', () => openLightbox(idx));
        card.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openLightbox(idx); }
        });
      });
    }

    function getRenderableCards() {
      const cards = [];
      const items = visibleItems();
      for (const item of items) {
        if (state.scrollOnly) {
          if (item.scroll?.dark || item.scroll?.light) cards.push({ item, scroll: true });
        } else {
          if (item.files?.dark || item.files?.light) cards.push({ item, scroll: false });
          if (state.includeScroll && (item.scroll?.dark || item.scroll?.light)) {
            cards.push({ item, scroll: true });
          }
        }
      }
      return cards;
    }

    function openLightbox(index) {
      const cards = getRenderableCards();
      if (index < 0 || index >= cards.length) return;
      state.lightboxIndex = index;
      updateLightbox(cards);
      $('#lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function updateLightbox(cards) {
      const { item, scroll } = cards[state.lightboxIndex];
      const content = $('#lb-content');
      const caption = $('#lb-caption');
      const suffix = scroll ? ' (scroll)' : '';

      if (state.theme === 'compare') {
        const bucket = scroll ? item.scroll : item.files;
        const dark = pickThemePath(bucket, 'dark');
        const light = pickThemePath(bucket, 'light');
        content.innerHTML = `
          <div class="lb-compare">
            <figure><img src="${imgSrc(dark)}" alt="dark" /><figcaption>Dark</figcaption></figure>
            <figure><img src="${imgSrc(light)}" alt="light" /><figcaption>Light</figcaption></figure>
          </div>`;
      } else {
        const rel = getItemImage(item, state.theme, scroll);
        content.innerHTML = `<img src="${imgSrc(rel)}" alt="${item.label}" />`;
      }
      caption.textContent = `${item.label} — ${item.sectionLabel}${suffix}`;
    }

    function closeLightbox() {
      $('#lightbox').classList.remove('open');
      document.body.style.overflow = '';
      state.lightboxIndex = -1;
    }

    function setViewport(vp) {
      state.viewport = vp;
      document.body.classList.toggle('viewport-desktop', vp === 'desktop');
      ['btnMobile', 'btnDesktop'].forEach((id) => $(`#${id}`).classList.remove('active'));
      $(`#${vp === 'desktop' ? 'btnDesktop' : 'btnMobile'}`).classList.add('active');
      render();
    }

    function setTheme(t) {
      state.theme = t;
      ['btnDark', 'btnLight', 'btnCompare'].forEach((id) => $(`#${id}`).classList.remove('active'));
      const map = { dark: 'btnDark', light: 'btnLight', compare: 'btnCompare' };
      $(`#${map[t]}`).classList.add('active');
      render();
    }

    function setSectionFilter(id) {
      state.sectionFilter = id;
      sectionFilter.value = id;
      categoryPills.querySelectorAll('.pill').forEach((p) => {
        p.classList.toggle('active', p.dataset.section === id);
      });
      render();
      if (id) {
        document.getElementById(`section-${id}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function initPills() {
      categoryPills.innerHTML = '';
      const all = document.createElement('button');
      all.type = 'button';
      all.className = 'pill active';
      all.dataset.section = '';
      all.textContent = 'All';
      all.addEventListener('click', () => setSectionFilter(''));
      categoryPills.appendChild(all);

      for (const sec of state.manifest.sections || []) {
        const count = (sec.items || []).length;
        const pill = document.createElement('button');
        pill.type = 'button';
        pill.className = 'pill';
        pill.dataset.section = sec.id;
        pill.textContent = `${sec.label || sec.title}: ${count}`;
        pill.addEventListener('click', () => setSectionFilter(sec.id));
        pill.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setSectionFilter(sec.id); }
        });
        categoryPills.appendChild(pill);

        const opt = document.createElement('option');
        opt.value = sec.id;
        opt.textContent = `${sec.label || sec.title} (${count})`;
        sectionFilter.appendChild(opt);
      }
    }

    function readEmbeddedManifest() {
      const el = document.getElementById('gallery-manifest-embedded');
      if (!el?.textContent?.trim()) return null;
      try {
        return JSON.parse(el.textContent);
      } catch {
        return null;
      }
    }

    async function loadManifest() {
      const embedded = readEmbeddedManifest();
      if (location.protocol === 'file:') {
        if (!embedded) throw new Error('No embedded manifest — run npm run gallery:embed');
        return embedded;
      }
      if (embedded) return embedded;
      const res = await fetch('assets/screenshots/manifest.json?v=' + Date.now());
      if (!res.ok) throw new Error('manifest.json not found — run npm run gallery');
      return res.json();
    }

    async function init() {
      try {
        state.manifest = await loadManifest();
        state.cacheBust = (state.manifest.generatedAt || Date.now()).toString().replace(/\W/g, '');
        const themes = state.manifest.themes?.length ? state.manifest.themes : ['dark', 'light'];
        const viewports = state.manifest.viewports?.length ? state.manifest.viewports : ['mobile'];
        const screenCount = (state.manifest.sections || []).reduce((n, s) => n + (s.items?.length || 0), 0);
        stats.textContent = `${screenCount} screens × ${themes.length} themes × ${viewports.length} viewports · ${state.manifest.generatedAt || 'unknown date'}`;
        buildFlatItems();
        initPills();
        render();
      } catch (e) {
        stats.textContent = 'Failed to load gallery';
        gallery.innerHTML = `<p class="err">${e.message}</p>`;
      }
    }

    $('#btnMobile').addEventListener('click', () => setViewport('mobile'));
    $('#btnDesktop').addEventListener('click', () => setViewport('desktop'));
    $('#btnDark').addEventListener('click', () => setTheme('dark'));
    $('#btnLight').addEventListener('click', () => setTheme('light'));
    $('#btnCompare').addEventListener('click', () => setTheme('compare'));
    sectionFilter.addEventListener('change', (e) => setSectionFilter(e.target.value));
    $('#scrollOnly').addEventListener('change', (e) => { state.scrollOnly = e.target.checked; render(); });
    $('#includeScroll').addEventListener('change', (e) => { state.includeScroll = e.target.checked; render(); });

    $('#lb-close').addEventListener('click', closeLightbox);
    $('#lightbox').addEventListener('click', (e) => { if (e.target.id === 'lightbox') closeLightbox(); });
    $('#lb-prev').addEventListener('click', (e) => {
      e.stopPropagation();
      const cards = getRenderableCards();
      state.lightboxIndex = (state.lightboxIndex - 1 + cards.length) % cards.length;
      updateLightbox(cards);
    });
    $('#lb-next').addEventListener('click', (e) => {
      e.stopPropagation();
      const cards = getRenderableCards();
      state.lightboxIndex = (state.lightboxIndex + 1) % cards.length;
      updateLightbox(cards);
    });
    document.addEventListener('keydown', (e) => {
      if (!$('#lightbox').classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') $('#lb-prev').click();
      if (e.key === 'ArrowRight') $('#lb-next').click();
    });

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
