name: LedgerCap CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Ledger reconciliation
        run: node scripts/verify-ledger.js
      - name: Install Playwright
        run: npm ci && npx playwright install chromium --with-deps
      - name: Bundle integrity
        run: npm run bundle && git diff --exit-code js/ledgercap.bundle.js index.html
      - name: E2E tests
        run: npm test
